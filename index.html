<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaQuest – Professional Language Placement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* (Stile bleiben weitgehend gleich, Ergänzungen für Audio-Buttons und Feedback) */
:root {
  --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --surface3: #252538;
  --border: rgba(255,255,255,0.07); --neon: #7c3aed; --neon2: #a855f7;
  --cyan: #06b6d4; --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
  --text: #f1f0ff; --text2: rgba(241,240,255,0.55);
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --r-md: 16px; --r-lg: 24px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
.bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px); background-size: 60px 60px; }
#app { position: relative; z-index: 1; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; }
.btn-primary { background: linear-gradient(135deg, var(--neon), var(--neon2)); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 16px; width: 100%; outline: none; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 28px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8); backdrop-filter: blur(12px); sticky; top: 0; z-index: 100; }
.nav-logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--neon2), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon), var(--cyan)); transition: width 0.5s; }
.results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.results-table th, .results-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.audio-controls { display: flex; gap: 10px; margin-top: 15px; }
.recommendation-list { margin: 15px 0; padding-left: 20px; }
.recommendation-list li { margin-bottom: 8px; color: var(--text2); }
/* Spezifische Test-Elemente */
.mc-option { background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 15px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
.mc-option:hover { border-color: var(--neon); }
.mc-option.selected { border-color: var(--neon); background: rgba(124,58,237,0.1); }
.mc-option.correct { border-color: var(--green); }
.mc-option.wrong { border-color: var(--red); }
.fib-input { background: var(--surface3); border: 2px solid var(--border); color: white; padding: 5px 10px; border-radius: 5px; }
.error-word { cursor: pointer; padding: 2px 4px; border-radius: 4px; }
.error-word:hover { background: rgba(245,158,11,0.2); }
.error-word.selected { background: var(--red); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div id="app">
  <!-- START SCREEN -->
  <div class="screen active" id="landing-screen">
    <nav class="nav"><div class="nav-logo">LinguaQuest</div></nav>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">
      <h1 style="font-family:var(--font-head); font-size:3.5rem; margin-bottom:10px;">Ready to <span style="color:var(--neon2)">Level Up?</span></h1>
      <p style="color:var(--text2); max-width:600px; margin-bottom:30px;">Der adaptive Englischtest für die Oberstufe. Präzise Analyse, Gamification und individuelles Feedback.</p>
      <div style="display:flex; gap:15px;">
        <button class="btn btn-primary" onclick="showScreen('student-join-screen')">Start Test</button>
        <button class="btn btn-secondary" onclick="showScreen('teacher-screen'); teacherInit();">Teacher Login</button>
      </div>
    </div>
  </div>

  <!-- TEACHER SCREEN -->
  <div class="screen" id="teacher-screen">
    <nav class="nav">
      <div class="nav-logo">LinguaQuest <span>Admin</span></div>
      <button class="btn btn-ghost" onclick="showScreen('landing-screen')">Logout</button>
    </nav>
    <div style="padding:32px; max-width:1200px; margin:0 auto; width:100%;">
      <h2 style="font-family:var(--font-head); margin-bottom:20px;">Dashboard: Ergebnisse pro Schüler*in</h2>
      <div class="card">
        <div id="teacher-results-container">
          <p style="color:var(--text3)">Keine Ergebnisse vorhanden.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- STUDENT JOIN SCREEN -->
  <div class="screen" id="student-join-screen">
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
      <div class="card" style="width:100%; max-width:400px;">
        <h2 style="margin-bottom:20px; text-align:center;">Join Test</h2>
        <input class="input" id="student-name" placeholder="Dein Name" style="margin-bottom:15px;">
        <button class="btn btn-primary" style="width:100%;" onclick="startPlacementTest()">Test starten</button>
      </div>
    </div>
  </div>

  <!-- TEST SCREEN -->
  <div class="screen" id="test-screen">
    <div class="nav">
      <div id="test-info">Frage 1/5</div>
      <div style="width:200px;"><div class="progress-bar"><div class="progress-fill" id="test-progress" style="width:0%"></div></div></div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
      <div id="question-container" style="max-width:700px; width:100%;"></div>
      <div style="margin-top:20px;"><button class="btn btn-primary" id="next-btn" onclick="checkAnswer()">Prüfen</button></div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="results-screen">
    <div style="padding:40px; max-width:800px; margin:0 auto; width:100%;">
      <div class="card" id="results-content">
        <!-- JS Content -->
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GRAMMAR DATA - 5 TASKS PER STRUCTURE (Increasing Difficulty)
   ============================================================ */
const GRAMMAR_DATA = {
  "Question words (Wh-)": [
    { level: 1, type: "mc", q: "___ is your best friend? - It's Sarah.", opts: ["Who", "Which", "Whose", "Where"], ans: 0 },
    { level: 2, type: "fib", q: "___ (Wann) does the lesson start tomorrow?", ans: "When" },
    { level: 3, type: "mc", q: "___ of these two cars is faster?", opts: ["What", "Which", "Whose", "How"], ans: 1 },
    { level: 4, type: "fib", q: "___ (Wessen) bag is this? It's lying on the floor.", ans: "Whose" },
    { level: 5, type: "reorder", words: ["does", "How", "often", "she", "go", "gym", "the", "?"], correct: ["How", "often", "does", "she", "go", "to", "the", "gym", "?"] }
  ],
  "Present Perfect": [
    { level: 1, type: "mc", q: "I ___ my keys. I can't find them!", opts: ["have lost", "lost", "has lost", "am losing"], ans: 0 },
    { level: 2, type: "fib", q: "She ___ (live) in London for three years now.", ans: "has lived" },
    { level: 3, type: "mc", q: "Have you ___ been to New York?", opts: ["never", "yet", "ever", "since"], ans: 2 },
    { level: 4, type: "fib", q: "We haven't seen him ___ (seit) last Tuesday.", ans: "since" },
    { level: 5, type: "error", sentence: "They have went to the cinema already.", error: "went", correction: "gone" }
  ],
  "Passive Voice": [
    { level: 1, type: "mc", q: "The cake ___ by my grandmother yesterday.", opts: ["was baked", "is baked", "baked", "was baking"], ans: 0 },
    { level: 2, type: "fib", q: "English ___ (speak) all over the world.", ans: "is spoken" },
    { level: 3, type: "mc", q: "The letters ___ yet.", opts: ["haven't been sent", "not sent", "won't sent", "are not sent"], ans: 0 },
    { level: 4, type: "fib", q: "The bridge ___ (build) in 1920.", ans: "was built" },
    { level: 5, type: "reorder", words: ["being", "The", "is", "cleaned", "room", "now", "."], correct: ["The", "room", "is", "being", "cleaned", "now", "."] }
  ]
};

let currentState = {
  name: "",
  currentStructure: "Question words (Wh-)",
  questionIdx: 0,
  score: {},
  results: [],
  allAnswers: []
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startPlacementTest() {
  const nameInput = document.getElementById('student-name').value;
  if(!nameInput) return alert("Name bitte!");
  currentState.name = nameInput;
  currentState.currentStructure = Object.keys(GRAMMAR_DATA)[0];
  currentState.questionIdx = 0;
  currentState.allAnswers = [];
  showScreen('test-screen');
  renderQuestion();
}

function renderQuestion() {
  const qData = GRAMMAR_DATA[currentState.currentStructure][currentState.questionIdx];
  const container = document.getElementById('question-container');
  const info = document.getElementById('test-info');
  const progress = document.getElementById('test-progress');

  const totalQs = Object.keys(GRAMMAR_DATA).length * 5;
  const currentQNum = (Object.keys(GRAMMAR_DATA).indexOf(currentState.currentStructure) * 5) + currentState.questionIdx + 1;
  
  info.innerText = `${currentState.currentStructure} (Level ${qData.level}/5)`;
  progress.style.width = `${(currentQNum / totalQs) * 100}%`;

  let html = `<h3 style="margin-bottom:20px;">${qData.q || "Was ist hier richtig?"}</h3>`;

  if(qData.type === 'mc') {
    html += qData.opts.map((o, i) => `<div class="mc-option" onclick="selectMC(${i})" id="mc-${i}">${o}</div>`).join('');
  } else if(qData.type === 'fib') {
    html += `<input class="input" id="fib-ans" placeholder="Antwort...">`;
  } else if(qData.type === 'reorder') {
    html += `<p style="color:var(--text2); margin-bottom:10px;">Bringe die Wörter in Ordnung:</p>
             <div class="card" style="background:var(--surface2)">${qData.words.join(' ')}</div>
             <input class="input" style="margin-top:15px;" id="reorder-ans" placeholder="Satz schreiben...">`;
  } else if(qData.type === 'error') {
    html += `<p>${qData.sentence}</p><input class="input" style="margin-top:15px;" id="error-ans" placeholder="Korrektes Wort...">`;
  }

  container.innerHTML = html;
  document.getElementById('next-btn').innerText = "Prüfen";
  document.getElementById('next-btn').onclick = checkAnswer;
}

let selectedMc = null;
function selectMC(i) {
  selectedMc = i;
  document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('selected'));
  document.getElementById(`mc-${i}`).classList.add('selected');
}

function checkAnswer() {
  const qData = GRAMMAR_DATA[currentState.currentStructure][currentState.questionIdx];
  let isCorrect = false;

  if(qData.type === 'mc') {
    isCorrect = (selectedMc === qData.ans);
  } else if(qData.type === 'fib') {
    isCorrect = (document.getElementById('fib-ans').value.toLowerCase().trim() === qData.ans.toLowerCase());
  } else if(qData.type === 'reorder') {
    isCorrect = (document.getElementById('reorder-ans').value.replace(/[.?]/g,'').toLowerCase().trim() === qData.correct.join(' ').replace(/[.?]/g,'').toLowerCase().trim());
  } else if(qData.type === 'error') {
    isCorrect = (document.getElementById('error-ans').value.toLowerCase().trim() === qData.correction.toLowerCase());
  }

  if(!currentState.score[currentState.currentStructure]) currentState.score[currentState.currentStructure] = 0;
  if(isCorrect) currentState.score[currentState.currentStructure]++;

  currentState.allAnswers.push({ structure: currentState.currentStructure, level: qData.level, correct: isCorrect });

  // Nächste Frage Logik
  currentState.questionIdx++;
  if(currentState.questionIdx >= 5) {
    currentState.questionIdx = 0;
    const structures = Object.keys(GRAMMAR_DATA);
    const nextIdx = structures.indexOf(currentState.currentStructure) + 1;
    if(nextIdx < structures.length) {
      currentState.currentStructure = structures[nextIdx];
      renderQuestion();
    } else {
      finishTest();
    }
  } else {
    renderQuestion();
  }
}

function finishTest() {
  showScreen('results-screen');
  const content = document.getElementById('results-content');
  
  // Berechnung der Empfehlung
  let recommendations = [];
  let summaryTextDE = `Hallo ${currentState.name}, vielen Dank für deinen Test. `;
  let summaryTextEN = `Hello ${currentState.name}, thank you for taking the test. `;

  Object.keys(currentState.score).forEach(s => {
    const val = currentState.score[s];
    if(val < 3) {
      recommendations.push(s);
    }
  });

  let recHtml = "";
  if(recommendations.length > 0) {
    summaryTextDE += "Du hast tolle Ansätze gezeigt. Besonders bei den folgenden Themen kannst du dich noch verbessern:";
    summaryTextEN += "You showed great effort. You can improve especially in the following areas:";
    recHtml = `<ul class="recommendation-list">` + recommendations.map(r => `<li><strong>${r}</strong></li>`).join('') + `</ul>`;
  } else {
    summaryTextDE += "Hervorragend! Du beherrschst alle getesteten Strukturen sicher.";
    summaryTextEN += "Excellent! You have a solid grasp of all tested structures.";
    recHtml = "<p>Keine spezifischen Wiederholungen nötig. Well done!</p>";
  }

  content.innerHTML = `
    <h2 style="font-family:var(--font-head); color:var(--neon2)">Dein Ergebnis</h2>
    <p style="margin:20px 0;">Hier ist deine individuelle Auswertung:</p>
    <div style="background:var(--surface2); padding:20px; border-radius:10px;">
      <p id="rec-text-de">${summaryTextDE}</p>
      ${recHtml}
    </div>
    <div class="audio-controls">
      <button class="btn btn-secondary" onclick="speak('de')">Listen (DE) 🇩🇪</button>
      <button class="btn btn-secondary" onclick="speak('en')">Listen (EN) 🇺🇸</button>
    </div>
    <button class="btn btn-primary" style="margin-top:30px;" onclick="location.reload()">Zur Startseite</button>
  `;

  // Daten für Lehrer speichern
  saveToTeacher(summaryTextDE);
}

function speak(lang) {
  const text = document.getElementById('rec-text-de').innerText; // Vereinfacht für Demo
  const msg = new SpeechSynthesisUtterance();
  msg.text = text;
  msg.lang = lang === 'de' ? 'de-DE' : 'en-US';
  window.speechSynthesis.speak(msg);
}

function saveToTeacher(summary) {
  let db = JSON.parse(localStorage.getItem('linguaResults') || '[]');
  const totalCorrect = Object.values(currentState.score).reduce((a, b) => a + b, 0);
  db.push({
    name: currentState.name,
    score: `${totalCorrect} / ${Object.keys(GRAMMAR_DATA).length * 5}`,
    details: currentState.score,
    date: new Date().toLocaleString()
  });
  localStorage.setItem('linguaResults', JSON.stringify(db));
}

function teacherInit() {
  const db = JSON.parse(localStorage.getItem('linguaResults') || '[]');
  const container = document.getElementById('teacher-results-container');
  
  if(db.length === 0) {
    container.innerHTML = "<p>Noch keine Teilnehmer.</p>";
    return;
  }

  let html = `<table class="results-table">
    <tr><th>Datum</th><th>Name</th><th>Gesamtscore</th><th>Details</th></tr>`;
  
  db.forEach(entry => {
    let details = Object.entries(entry.details).map(([k,v]) => `${k}: ${v}/5`).join(', ');
    html += `<tr>
      <td>${entry.date}</td>
      <td><strong>${entry.name}</strong></td>
      <td>${entry.score}</td>
      <td style="color:var(--text2); font-size:0.8rem;">${details}</td>
    </tr>`;
  });
  html += `</table>`;
  container.innerHTML = html;
}
</script>
</body>
</html>
