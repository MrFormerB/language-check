<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaQuest Pro – Sprachniveau-Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* Hier werden die Stile aus der originalen index.html übernommen */
:root {
  --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --surface3: #252538;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --neon: #7c3aed; --neon2: #a855f7; --neon-glow: rgba(124,58,237,0.35);
  --cyan: #06b6d4; --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
  --text: #f1f0ff; --text2: rgba(241,240,255,0.7); --text3: rgba(241,240,255,0.4);
  --r-sm: 10px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px;
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
.bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px); background-size: 60px 60px; }
.screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: none; border-radius: var(--r-sm); font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; }
.btn-primary { background: linear-gradient(135deg, var(--neon), var(--neon2)); color: white; box-shadow: 0 0 20px var(--neon-glow); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 28px; }
.input { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text); padding: 12px; width: 100%; outline: none; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; color: var(--neon2); }
.grammar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
.grammar-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: pointer; transition: 0.15s; font-size: 0.88rem; }
.grammar-item.selected { background: rgba(124,58,237,0.15); border-color: var(--neon); color: var(--neon2); }
.teacher-layout { display: grid; grid-template-columns: 260px 1fr; flex: 1; }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; }
.results-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text); }
.results-table th, .results-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.recommendation-box { background: rgba(124,58,237,0.1); border: 1px solid var(--neon); border-radius: var(--r-md); padding: 20px; margin-top: 20px; }
.audio-controls { display: flex; gap: 10px; margin-top: 15px; }
.audio-btn { background: var(--surface3); border: 1px solid var(--neon2); color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
.progress-bar { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; margin: 20px 0; }
.progress-fill { height: 100%; background: var(--neon); transition: width 0.5s; }
.mc-option { background: var(--surface2); border: 1px solid var(--border2); padding: 15px; border-radius: var(--r-sm); margin-bottom: 10px; cursor: pointer; }
.mc-option.selected { background: var(--neon); color: white; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div id="app">
  <!-- LANDING SCREEN -->
  <div class="screen active" id="landing-screen">
    <nav class="nav">
      <div class="nav-logo">LinguaQuest <span>Pro</span></div>
      <div class="nav-right">
        <button class="btn btn-ghost" onclick="showScreen('student-join-screen')">Schüler-Login</button>
        <button class="btn btn-primary" onclick="showScreen('teacher-screen'); teacherInit();">Lehrkraft-Dashboard</button>
      </div>
    </nav>
    <div style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px;">
      <div>
        <h1 style="font-family:var(--font-head); font-size:3.5rem; margin-bottom:20px;">Master your English.</h1>
        <p style="color:var(--text2); font-size:1.2rem; margin-bottom:40px;">Interaktive Grammatik-Tests mit KI-gestütztem Feedback.</p>
        <button class="btn btn-primary" onclick="showScreen('student-join-screen')">Jetzt Test starten</button>
      </div>
    </div>
  </div>

  <!-- TEACHER SCREEN -->
  <div class="screen" id="teacher-screen">
    <nav class="nav">
      <div class="nav-logo">Teacher Dashboard</div>
      <button class="btn btn-ghost" onclick="showScreen('landing-screen')">Abmelden</button>
    </nav>
    <div class="teacher-layout">
      <div class="sidebar">
        <button class="btn btn-secondary" style="width:100%; margin-bottom:10px;" onclick="teacherTab('groups')">Meine Gruppen</button>
        <button class="btn btn-secondary" style="width:100%;" onclick="teacherTab('create')">Neue Gruppe</button>
      </div>
      <div style="padding:32px;" id="teacher-content">
        <!-- Panel: Gruppenübersicht -->
        <div id="panel-groups">
          <h2 style="margin-bottom:20px;">Aktive Lerngruppen</h2>
          <div id="groups-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
        </div>
        <!-- Panel: Gruppe erstellen -->
        <div id="panel-create" style="display:none;">
          <h2 style="margin-bottom:20px;">Gruppe konfigurieren</h2>
          <div class="card">
            <input type="text" id="group-name" class="input" placeholder="Name der Klasse (z.B. 10b)" style="margin-bottom:15px;">
            <select id="group-level" class="input" onchange="updateGrammarList()" style="margin-bottom:15px;">
              <option value="A2">A2 – Grundkenntnisse</option>
              <option value="B1" selected>B1 – Fortgeschrittene Grundkenntnisse</option>
              <option value="B2">B2 – Selbstständig</option>
              <option value="C1">C1 – Kompetente Verwendung</option>
            </select>
            <div id="grammar-grid" class="grammar-grid"></div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="saveGroup()">Gruppe speichern</button>
          </div>
        </div>
        <!-- Panel: Einzelergebnisse -->
        <div id="panel-group-detail" style="display:none;">
          <h2 id="detail-title">Ergebnisse</h2>
          <div id="results-container"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- STUDENT JOIN SCREEN -->
  <div class="screen" id="student-join-screen">
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
      <div class="card" style="max-width:400px; width:100%; text-align:center;">
        <h2 style="margin-bottom:20px;">Test beitreten</h2>
        <input type="text" id="student-name" class="input" placeholder="Dein Name" style="margin-bottom:15px;">
        <input type="text" id="join-code" class="input" placeholder="Code (z.B. A2-882)" style="margin-bottom:20px;">
        <button class="btn btn-primary" style="width:100%;" onclick="joinGroup()">Start 🚀</button>
      </div>
    </div>
  </div>

  <!-- TEST SCREEN -->
  <div class="screen" id="test-screen">
    <div style="padding:40px; max-width:800px; margin:0 auto; width:100%;">
      <div id="test-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span id="topic-label">Grammatik</span>
        <span id="q-counter">1 / 5</span>
      </div>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width: 0%"></div></div>
      <div id="question-area" class="card"></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="results-screen">
    <div style="padding:40px; max-width:800px; margin:0 auto;">
      <div class="card">
        <h2>Dein Ergebnis</h2>
        <div id="final-score" style="font-size:3rem; font-weight:800; margin:20px 0;">0%</div>
        <div class="recommendation-box">
          <h3>Empfehlungen:</h3>
          <ul id="recommendation-list" style="margin:15px 20px;"></ul>
          <div class="audio-controls">
            <button class="audio-btn" onclick="speak('de')">Auf Deutsch anhören 🇩🇪</button>
            <button class="audio-btn" onclick="speak('en')">Listen in English 🇬🇧</button>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="location.reload()">Fertig</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   DATA & DB
   ============================================================ */
const GRAMMAR_BY_LEVEL = {
  A2: ['Simple Present', 'Simple Past', 'Present Progressive'],
  B1: ['Present Perfect Simple', 'Passive Voice', 'Conditional I'],
  B2: ['Past Perfect', 'Conditional II', 'Reported Speech'],
  C1: ['Inversion', 'Participle Clauses', 'Subjunctive']
};

// Jede Struktur hat exakt 5 Aufgaben mit steigender Schwierigkeit (1-5)
const TASK_POOL = {
  "Present Perfect Simple": [
    { diff: 1, type: "mc", q: "I ___ (finish) my homework.", opts: ["have finished", "has finished", "finished"], ans: 0 },
    { diff: 2, type: "mc", q: "She ___ (never/be) to London.", opts: ["has never been", "never was", "is never been"], ans: 0 },
    { diff: 3, type: "fib", q: "How long ___ (you / live) in this city?", ans: "have you lived" },
    { diff: 4, type: "fib", q: "Since I started work, I ___ (not/have) much free time.", ans: "have not had" },
    { diff: 5, type: "mc", q: "Which is correct? 'I ___ the report and now it's on your desk.'", opts: ["wrote", "have written", "had written"], ans: 1 }
  ],
  "Passive Voice": [
    { diff: 1, type: "mc", q: "This car ___ (make) in Germany.", opts: ["is made", "makes", "was making"], ans: 0 },
    { diff: 2, type: "mc", q: "The window ___ (break) by a ball yesterday.", opts: ["is broken", "was broken", "broke"], ans: 1 },
    { diff: 3, type: "fib", q: "The letters ___ (deliver) every morning at 8:00.", ans: "are delivered" },
    { diff: 4, type: "fib", q: "When I arrived, the cake ___ (eat) already.", ans: "had been eaten" },
    { diff: 5, type: "mc", q: "A new stadium ___ (build) in the city center right now.", opts: ["is building", "is being built", "has built"], ans: 1 }
  ]
  // ... weitere Strukturen analog ergänzen
};

let groups = JSON.parse(localStorage.getItem('lq_groups') || '[]');
let currentTest = { questions: [], index: 0, score: 0, student: "", topicResults: {} };

/* ============================================================
   TEACHER FUNCTIONS
   ============================================================ */
function teacherInit() {
  renderGroups();
  updateGrammarList();
}

function teacherTab(tab) {
  ['groups', 'create', 'group-detail'].forEach(p => document.getElementById('panel-'+p).style.display = 'none');
  document.getElementById('panel-'+tab).style.display = 'block';
}

function updateGrammarList() {
  const level = document.getElementById('group-level').value;
  const grid = document.getElementById('grammar-grid');
  grid.innerHTML = GRAMMAR_BY_LEVEL[level].map(g => `
    <div class="grammar-item" onclick="this.classList.toggle('selected')">${g}</div>
  `).join('');
}

function saveGroup() {
  const name = document.getElementById('group-name').value;
  const level = document.getElementById('group-level').value;
  const selected = [...document.querySelectorAll('.grammar-item.selected')].map(el => el.textContent);
  
  if(!name || selected.length === 0) return alert("Name und Strukturen wählen!");
  
  const newGroup = {
    id: level + "-" + Math.floor(Math.random()*1000),
    name, level, grammar: selected, results: []
  };
  groups.push(newGroup);
  localStorage.setItem('lq_groups', JSON.stringify(groups));
  teacherTab('groups');
  renderGroups();
}

function renderGroups() {
  const grid = document.getElementById('groups-grid');
  grid.innerHTML = groups.map(g => `
    <div class="card" onclick="showGroupDetails('${g.id}')" style="cursor:pointer;">
      <h3>${g.name} (${g.level})</h3>
      <p style="color:var(--neon2)">Code: ${g.id}</p>
      <p>${g.results.length} Schüler haben teilgenommen</p>
    </div>
  `).join('');
}

function showGroupDetails(id) {
  const g = groups.find(x => x.id === id);
  teacherTab('group-detail');
  document.getElementById('detail-title').textContent = `Ergebnisse: ${g.name}`;
  const container = document.getElementById('results-container');
  
  if(g.results.length === 0) {
    container.innerHTML = "<p>Noch keine Teilnehmer.</p>";
  } else {
    container.innerHTML = `
      <table class="results-table">
        <thead><tr><th>Name</th><th>Score</th><th>Datum</th></tr></thead>
        <tbody>
          ${g.results.map(r => `<tr><td>${r.student}</td><td>${r.score}%</td><td>${r.date}</td></tr>`).join('')}
        </tbody>
      </table>
    `;
  }
}

/* ============================================================
   TEST FUNCTIONS
   ============================================================ */
function joinGroup() {
  const code = document.getElementById('join-code').value;
  const name = document.getElementById('student-name').value;
  const g = groups.find(x => x.id === code);
  
  if(!g || !name) return alert("Code oder Name falsch!");
  
  currentTest.student = name;
  currentTest.groupId = code;
  currentTest.questions = [];
  
  // 5 Aufgaben pro Struktur generieren
  g.grammar.forEach(topic => {
    const pool = TASK_POOL[topic] || [];
    currentTest.questions.push(...pool.map(p => ({...p, topic})));
    currentTest.topicResults[topic] = { correct: 0, total: 5 };
  });
  
  showScreen('test-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = currentTest.questions[currentTest.index];
  const area = document.getElementById('question-area');
  const progress = (currentTest.index / currentTest.questions.length) * 100;
  
  document.getElementById('progress-fill').style.width = progress + "%";
  document.getElementById('topic-label').textContent = `${q.topic} (Schwierigkeit: ${q.diff}/5)`;
  document.getElementById('q-counter').textContent = `${currentTest.index + 1} / ${currentTest.questions.length}`;

  let html = `<p style="font-size:1.2rem; margin-bottom:20px;">${q.q}</p>`;
  if(q.type === "mc") {
    html += q.opts.map((o, i) => `<div class="mc-option" onclick="answer(${i})">${o}</div>`).join('');
  } else {
    html += `<input type="text" id="fib-input" class="input" placeholder="Antwort...">
             <button class="btn btn-primary" style="margin-top:20px;" onclick="answer(document.getElementById('fib-input').value)">Prüfen</button>`;
  }
  area.innerHTML = html;
}

function answer(val) {
  const q = currentTest.questions[currentTest.index];
  let correct = false;
  
  if(q.type === "mc") correct = (val === q.ans);
  else correct = (val.toLowerCase().trim() === q.ans.toLowerCase());

  if(correct) {
    currentTest.score++;
    currentTest.topicResults[q.topic].correct++;
  }

  currentTest.index++;
  if(currentTest.index < currentTest.questions.length) renderQuestion();
  else finishTest();
}

function finishTest() {
  const pct = Math.round((currentTest.score / currentTest.questions.length) * 100);
  document.getElementById('final-score').textContent = pct + "%";
  
  // Speichern für Lehrer
  const g = groups.find(x => x.id === currentTest.groupId);
  g.results.push({ student: currentTest.student, score: pct, date: new Date().toLocaleDateString() });
  localStorage.setItem('lq_groups', JSON.stringify(groups));

  // Empfehlungen generieren
  const recList = document.getElementById('recommendation-list');
  recList.innerHTML = "";
  Object.entries(currentTest.topicResults).forEach(([topic, res]) => {
    const li = document.createElement('li');
    if(res.correct === 5) li.textContent = `🌟 ${topic}: Perfekt! Du beherrschst diese Struktur vollständig.`;
    else if(res.correct >= 3) li.textContent = `✅ ${topic}: Gute Ansätze, übe besonders die komplexeren Fälle (Stufe 4-5).`;
    else li.textContent = `📚 ${topic}: Hier solltest du die Grundlagen nochmal wiederholen.`;
    recList.appendChild(li);
  });

  showScreen('results-screen');
}

function speak(lang) {
  const text = [...document.querySelectorAll('#recommendation-list li')].map(li => li.textContent).join(". ");
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = lang === 'de' ? 'de-DE' : 'en-US';
  window.speechSynthesis.speak(msg);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
